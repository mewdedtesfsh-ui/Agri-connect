services:
  # PostgreSQL Database
  - type: pserv
    name: agriconnect-db
    env: docker
    plan: free
    databases:
      - name: agriconnect
        user: agriconnect

  # Backend API
  - type: web
    name: agriconnect-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: agriconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: agriconnect-frontend
          property: host

  # Frontend
  - type: web
    name: agriconnect-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: agriconnect-backend
          property: host

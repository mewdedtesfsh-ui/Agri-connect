version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agriconnect-db
    environment:
      POSTGRES_DB: agriconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/config/db-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - agriconnect-network

  backend:
    build: ./backend
    container_name: agriconnect-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agriconnect
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      WEATHER_API_URL: https://api.openweathermap.org/data/2.5
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - agriconnect-network

  frontend:
    build: ./frontend
    container_name: agriconnect-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - agriconnect-network

volumes:
  postgres_data:

networks:
  agriconnect-network:
    driver: bridge
